name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install deps
        run: npm ci
        
      - name: Run tests
        run: npm run test
        
      - name: Run E2E tests
        run: npm run test:e2e
