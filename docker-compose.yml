version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_STRIPE_MODE: ${VITE_STRIPE_MODE:-test}
        VITE_STRIPE_TEST_PUBLISHABLE_KEY: ${VITE_STRIPE_TEST_PUBLISHABLE_KEY:-}
        VITE_STRIPE_LIVE_PUBLISHABLE_KEY: ${VITE_STRIPE_LIVE_PUBLISHABLE_KEY:-}
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
        VITE_ECOMMERCE_MODE: ${VITE_ECOMMERCE_MODE:-true}
        VITE_AI_SUGGESTIONS: ${VITE_AI_SUGGESTIONS:-true}
    container_name: thealttext-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-host.docker.internal}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
